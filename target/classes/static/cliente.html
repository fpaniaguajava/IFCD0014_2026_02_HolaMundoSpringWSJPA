<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listado de Videojuegos</title>

<style>
    body{
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: linear-gradient(135deg,#1e293b,#0f172a);
        margin:0;
        padding:40px;
        color:#333;
    }

    .container{
        max-width:900px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:25px;
        color:#0f172a;
    }

    table{
        width:100%;
        border-collapse:collapse;
        font-size:16px;
    }

    thead{
        background:#2563eb;
        color:white;
    }

    th, td{
        padding:12px 15px;
        text-align:left;
    }

    tbody tr{
        border-bottom:1px solid #e5e7eb;
        transition:background 0.2s;
    }

    tbody tr:hover{
        background:#f1f5f9;
    }

    th{
        letter-spacing:0.5px;
    }

    .loading{
        text-align:center;
        padding:20px;
        color:#64748b;
    }

</style>
</head>
<body>

<div class="container">
    <h1>🎮 Videojuegos</h1>

    <div id="loading" class="loading">Cargando videojuegos...</div>

    <table id="tablaVideojuegos" style="display:none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Plataforma</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>
</div>

<script>

async function cargarVideojuegos() {

    try{
        const response = await fetch("http://localhost:8080/videojuego/");
        const videojuegos = await response.json();

        const tbody = document.getElementById("tablaBody");
        tbody.innerHTML = "";

        videojuegos.forEach(v => {
            const fila = document.createElement("tr");

            fila.innerHTML = `
                <td>${v.id}</td>
                <td>${v.titulo}</td>
                <td>${v.plataforma}</td>
            `;

            tbody.appendChild(fila);
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("tablaVideojuegos").style.display = "table";

    }catch(error){
        document.getElementById("loading").innerText = "Error cargando los datos";
        console.error(error);
    }

}

window.addEventListener("load", cargarVideojuegos);

</script>

</body>
</html>
